<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GapScope — AVI / H.264 playback test</title>
<style>
  :root{
    --bg:#0a0e0f; --panel:#0f1718; --ink:#cfe9e0; --dim:#6f8f86;
    --accent:#39d0a8; --warn:#e0b020; --err:#e0604a; --line:#1d2d2c;
    --mono:"Cascadia Code",Consolas,"SF Mono",Menlo,monospace;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font:13px/1.5 var(--mono);}
  header{padding:10px 16px;border-bottom:1px solid var(--line);display:flex;gap:14px;align-items:baseline}
  header h1{font-size:14px;margin:0;color:var(--accent);letter-spacing:.5px}
  header span{color:var(--dim);font-size:12px}
  main{display:grid;grid-template-columns:minmax(420px,1fr) 380px;gap:14px;padding:14px}
  @media(max-width:900px){main{grid-template-columns:1fr}}
  #drop{border:1.5px dashed var(--line);border-radius:8px;padding:22px;text-align:center;color:var(--dim);cursor:pointer;transition:.15s}
  #drop.hot{border-color:var(--accent);color:var(--ink);background:#0d1413}
  #drop b{color:var(--accent)}
  .stage{background:#000;border:1px solid var(--line);border-radius:8px;overflow:hidden;position:relative}
  canvas#view{width:100%;display:block;background:#000;aspect-ratio:16/9;object-fit:contain}
  .controls{display:flex;gap:8px;align-items:center;margin-top:10px;flex-wrap:wrap}
  button{font:inherit;background:#11201e;color:var(--ink);border:1px solid var(--line);border-radius:6px;padding:6px 12px;cursor:pointer}
  button:hover:not(:disabled){border-color:var(--accent)}
  button:disabled{opacity:.4;cursor:default}
  input[type=range]{flex:1;min-width:140px;accent-color:var(--accent)}
  .pill{padding:2px 8px;border:1px solid var(--line);border-radius:10px;color:var(--dim);font-size:11px}
  .info{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:10px 12px}
  .info h2{font-size:12px;margin:0 0 8px;color:var(--dim);text-transform:uppercase;letter-spacing:.6px}
  .kv{display:grid;grid-template-columns:140px 1fr;gap:2px 10px;font-size:12px}
  .kv .k{color:var(--dim)}
  .kv .v{color:var(--ink);word-break:break-all}
  #log{background:#070b0b;border:1px solid var(--line);border-radius:8px;padding:8px 10px;height:280px;overflow:auto;white-space:pre-wrap;font-size:11.5px;color:#9fc3b9}
  #log .e{color:var(--err)} #log .w{color:var(--warn)} #log .ok{color:var(--accent)} #log .t{color:#587a72}
  .row{display:flex;gap:10px;flex-direction:column}
</style>
</head>
<body>
<header>
  <h1>AVI / H.264 → WebCodecs playback test</h1>
  <span id="capnote"></span>
</header>

<main>
  <div class="row">
    <div id="drop">Drop a <b>.avi</b> file here, or click to pick one.
      <input id="file" type="file" accept=".avi,video/*" hidden>
    </div>

    <div class="stage"><canvas id="view" width="1280" height="720"></canvas></div>

    <div class="controls">
      <button id="play" disabled>▶ Play</button>
      <button id="pause" disabled>⏸ Pause</button>
      <input id="seek" type="range" min="0" max="0" value="0" step="1" disabled>
      <span class="pill" id="fcount">– / –</span>
      <label class="pill">speed
        <select id="speed" style="background:transparent;color:var(--ink);border:none;font:inherit">
          <option>0.25</option><option>0.5</option><option selected>1</option><option>2</option><option>4</option>
        </select>
      </label>
    </div>

    <div class="info">
      <h2>Stream</h2>
      <div class="kv" id="meta"><div class="k">file</div><div class="v">—</div></div>
    </div>
  </div>

  <div class="row">
    <div class="info"><h2>Log</h2><div id="log"></div></div>
  </div>
</main>

<script>
"use strict";
(function(){
  // ---------- tiny DOM helpers ----------
  var $=function(s){return document.querySelector(s);};
  var logEl=$("#log");
  function log(msg,cls){
    var t=(performance.now()/1000).toFixed(2);
    var line=document.createElement("div");
    if(cls) line.className=cls;
    line.innerHTML='<span class="t">'+t+'</span>  '+String(msg).replace(/&/g,"&amp;").replace(/</g,"&lt;");
    logEl.appendChild(line); logEl.scrollTop=logEl.scrollHeight;
  }
  function setMeta(obj){
    var box=$("#meta"); box.innerHTML="";
    Object.keys(obj).forEach(function(k){
      var a=document.createElement("div");a.className="k";a.textContent=k;
      var b=document.createElement("div");b.className="v";b.textContent=obj[k];
      box.appendChild(a);box.appendChild(b);
    });
  }

  // ---------- byte helpers ----------
  function fourcc(dv,off){return String.fromCharCode(dv.getUint8(off),dv.getUint8(off+1),dv.getUint8(off+2),dv.getUint8(off+3));}
  function readBuf(file,start,len){return file.slice(start,start+len).arrayBuffer();}

  // ---------- state ----------
  var file=null;
  var frames=[];           // {pos, size, key, tsUs}  (video frames only, file order)
  var dtUs=33333;          // microseconds per frame
  var codecStr="avc1.4D4033";
  var width=0,height=0;
  var decoder=null;
  var displayBuf=[];       // decoded VideoFrames awaiting display, kept sorted by timestamp
  var feedIdx=0, feedLimit=0, pumping=false, feeding=false, flushed=false;
  var outCount=0, sessionBase=0;            // presentation-order counter + keyframe the current decode session started from
  var playing=false, playStartPerf=0, playStartFrame=0, pausedFrame=0, speed=1;
  function framesPerMs(){return speed*1000/dtUs;}
  function keyframeAtOrBefore(i){ i=Math.max(0,Math.min(frames.length-1,i|0)); while(i>0&&!frames[i].key)i--; return i; }
  var REORDER_MARGIN=8;   // decode a few frames past a paused seek target so the decoder releases held B-frames (no flush needed)
  var view=$("#view"), vctx=view.getContext("2d");

  // ---------- AVI demux ----------
  // Walk the top-level RIFF chunks (header reads only) to locate hdrl / movi / idx1.
  async function scanTopLevel(file){
    var head=new DataView(await readBuf(file,0,12));
    if(fourcc(head,0)!=="RIFF"||fourcc(head,8)!=="AVI ") throw new Error("not a RIFF/AVI file");
    var fileSize=file.size, pos=12, out={hdrlPos:0,hdrlSize:0,moviFourccPos:0,idx1Pos:0,idx1Size:0};
    while(pos+8<=fileSize){
      var hb=new DataView(await readBuf(file,pos,12));
      var id=fourcc(hb,0), size=hb.getUint32(4,true);
      if(id==="LIST"){
        var lt=fourcc(hb,8);
        if(lt==="hdrl"){out.hdrlPos=pos+12;out.hdrlSize=size-4;}
        else if(lt==="movi"){out.moviFourccPos=pos+8;} // position of the 'movi' fourcc
        pos+=8+size+(size&1);
      }else{
        if(id==="idx1"){out.idx1Pos=pos+8;out.idx1Size=size;}
        pos+=8+size+(size&1);
      }
    }
    return out;
  }

  // Parse the hdrl LIST blob for avih (timing/dims) and the video strh/strf.
  function parseHdrl(buf){
    var dv=new DataView(buf), n=buf.byteLength, p=0, res={};
    function walk(p,end){
      while(p+8<=end){
        var id=fourcc(dv,p), size=dv.getUint32(p+4,true), body=p+8;
        if(id==="LIST"){ walk(body+4,body+size); }
        else if(id==="avih"){
          res.microSecPerFrame=dv.getUint32(body,true);
          res.totalFrames=dv.getUint32(body+16,true);
          res.width=dv.getUint32(body+32,true);
          res.height=dv.getUint32(body+36,true);
        }else if(id==="strh"){
          res._lastStrhType=fourcc(dv,body);     // 'vids' / 'auds'
          res._lastHandler=fourcc(dv,body+4);     // codec fourcc, e.g. H264
          var scale=dv.getUint32(body+20,true), rate=dv.getUint32(body+24,true);
          if(res._lastStrhType==="vids"&&scale){res.fps=rate/scale;res.handler=res._lastHandler;}
        }
        p=body+size+(size&1);
      }
    }
    walk(0,n);
    return res;
  }

  // Read idx1, auto-detect the offset base, keep video chunks.
  async function readIndex(file,info){
    var dv=new DataView(await readBuf(file,info.idx1Pos,info.idx1Size));
    var nEnt=Math.floor(info.idx1Size/16);
    if(nEnt===0) throw new Error("idx1 present but empty");
    // detect base: entry.offset may be relative to the 'movi' fourcc, or absolute from file start.
    var firstOff=dv.getUint32(8,true); // dwChunkOffset of entry 0 (ckid 0, flags 4, offset 8, length 12)
    var bases=[{name:"movi-relative",base:info.moviFourccPos},{name:"absolute",base:0}];
    var chosen=null;
    for(var b=0;b<bases.length;b++){
      var hp=bases[b].base+firstOff;
      try{
        var probe=new DataView(await readBuf(file,hp,4));
        var fc=fourcc(probe,0);
        if(/^\d\d[a-z][a-z]$/.test(fc)){chosen=bases[b];break;}
      }catch(e){}
    }
    if(!chosen) throw new Error("could not resolve idx1 offset base");
    log("idx1: "+nEnt+" entries, base = "+chosen.name,"ok");
    var list=[];
    for(var i=0;i<nEnt;i++){
      var o=i*16;
      var ckid=fourcc(dv,o);
      var flags=dv.getUint32(o+4,true);
      var coff=dv.getUint32(o+8,true);
      var clen=dv.getUint32(o+12,true);
      var suffix=ckid.slice(2);
      if(suffix==="dc"||suffix==="db"){          // compressed / uncompressed video
        list.push({pos:chosen.base+coff+8, size:clen, key:(flags&0x10)!==0});
      }
    }
    return list;
  }

  // Scan Annex-B NAL units: pull SPS (for codec string) and note IDR presence.
  function inspectNals(bytes){
    var i=0,n=bytes.length,sps=null,hasIdr=false,hasSps=false;
    while(i+3<n){
      // find start code 00 00 01 (with optional leading 00)
      if(bytes[i]===0&&bytes[i+1]===0&&bytes[i+2]===1){
        var nalStart=i+3;
        var type=bytes[nalStart]&0x1f;
        if(type===7){hasSps=true; sps=sps||[bytes[nalStart+1],bytes[nalStart+2],bytes[nalStart+3]];}
        if(type===5){hasIdr=true;}
        i=nalStart+1;
      }else i++;
    }
    return {sps:sps,hasIdr:hasIdr,hasSps:hasSps};
  }

  function codecFromSps(sps){
    function h(x){return ("0"+x.toString(16)).slice(-2).toUpperCase();}
    return "avc1."+h(sps[0])+h(sps[1])+h(sps[2]);
  }

  // ---------- decode pipeline ----------
  function destroyDecoder(){
    feeding=false;
    displayBuf.forEach(function(d){try{d.frame.close();}catch(e){}});
    displayBuf=[];
    if(decoder){try{decoder.close();}catch(e){} decoder=null;}
  }
  function newDecoder(){
    destroyDecoder();
    outCount=0; flushed=false;
    decoder=new VideoDecoder({
      // WebCodecs emits frames in PRESENTATION order — tag each with its arrival index, never re-sort.
      output:function(frame){ displayBuf.push({pidx:outCount++, frame:frame}); },
      error:function(e){log("decoder error: "+e.message,"e");}
    });
    decoder.configure({codec:codecStr,optimizeForLatency:true,hardwareAcceleration:"no-preference"});
  }

  async function pump(){
    if(pumping||!decoder||!feeding) return; pumping=true;
    var myDec=decoder;                              // a seek may swap this out mid-read; bail if it does
    try{
      while(feeding&&decoder===myDec&&feedIdx<=feedLimit&&feedIdx<frames.length&&
            myDec.decodeQueueSize<20&&displayBuf.length<32){
        var f=frames[feedIdx];
        var bytes=new Uint8Array(await readBuf(file,f.pos,f.size));
        if(decoder!==myDec) break;                  // seek replaced the decoder while we were reading
        myDec.decode(new EncodedVideoChunk({
          type:f.key?"key":"delta", timestamp:feedIdx*dtUs, duration:dtUs, data:bytes
        }));
        feedIdx++;
      }
      // only flush at the true end of the stream — flush() forces a keyframe before the next decode,
      // which would break resume; mid-stream we rely on REORDER_MARGIN to drain held frames instead.
      if(decoder===myDec&&!flushed&&feedIdx>frames.length-1){ flushed=true; myDec.flush().catch(function(){}); }
    }catch(e){ if(decoder===myDec) log("pump error: "+e.message,"e"); }
    pumping=false;
  }

  function render(){
    requestAnimationFrame(render);
    if(!frames.length) return;
    var globalFrame = playing ? playStartFrame+(performance.now()-playStartPerf)*framesPerMs() : pausedFrame;
    var targetPidx = globalFrame - sessionBase;
    // draw the newest available frame at/under the playback position; close the ones we skip past
    var toDraw=null;
    while(displayBuf.length && displayBuf[0].pidx<=targetPidx){
      if(toDraw) try{toDraw.frame.close();}catch(e){}
      toDraw=displayBuf.shift();
    }
    if(toDraw){
      var fr=toDraw.frame;
      if(view.width!==fr.displayWidth){view.width=fr.displayWidth;view.height=fr.displayHeight;}
      vctx.drawImage(fr,0,0);
      try{fr.close();}catch(e){}
    }
    if(feeding) pump();
    if(playing){
      var fi=Math.min(frames.length-1,Math.max(0,Math.round(globalFrame)));
      $("#seek").value=fi; $("#fcount").textContent=(fi+1)+" / "+frames.length;
      if(fi>=frames.length-1 && feedIdx>frames.length-1 && displayBuf.length===0){
        playing=false; feeding=false; pausedFrame=frames.length-1; log("reached end of stream","ok");
      }
    }
  }

  // ---------- controls ----------
  function startPlay(){
    if(!frames.length) return;
    // a flushed decoder (or none) can't resume with a delta — restart the session from a keyframe
    if(!decoder||flushed){ var k=keyframeAtOrBefore(Math.round(pausedFrame)); newDecoder(); sessionBase=k; feedIdx=k; }
    feeding=true; feedLimit=frames.length-1;
    playing=true; playStartPerf=performance.now(); playStartFrame=pausedFrame;
    pump();
  }
  function doPause(){
    if(!playing) return;
    pausedFrame = playStartFrame+(performance.now()-playStartPerf)*framesPerMs();
    pausedFrame=Math.max(0,Math.min(frames.length-1,pausedFrame));
    playing=false; feeding=false;
  }
  function seekTo(frameIdx, keepPlaying){
    frameIdx=Math.max(0,Math.min(frames.length-1,frameIdx|0));
    var k=keyframeAtOrBefore(frameIdx);
    newDecoder(); sessionBase=k; feedIdx=k; feeding=true;
    feedLimit = keepPlaying ? frames.length-1 : Math.min(frames.length-1, frameIdx+REORDER_MARGIN);
    pausedFrame=frameIdx;
    if(keepPlaying){ playing=true; playStartPerf=performance.now(); playStartFrame=frameIdx; }
    else playing=false;
    $("#fcount").textContent=(frameIdx+1)+" / "+frames.length;
    pump();
  }

  $("#play").onclick=startPlay;
  $("#pause").onclick=doPause;
  $("#speed").onchange=function(){ var was=playing; if(was)doPause(); speed=parseFloat(this.value); if(was)startPlay(); };
  $("#seek").oninput=function(){ var was=playing; playing=false; seekTo(parseInt(this.value,10),false); };

  // ---------- load ----------
  async function load(f){
    file=f; frames=[]; destroyDecoder(); playing=false; pausedFrame=0;
    $("#play").disabled=$("#pause").disabled=$("#seek").disabled=true;
    log("loading "+f.name+"  ("+(f.size/1048576).toFixed(1)+" MB)…");
    if(typeof VideoDecoder==="undefined"){ log("WebCodecs VideoDecoder is NOT available in this browser/context.","e"); return; }
    try{
      var info=await scanTopLevel(file);
      if(!info.moviFourccPos) throw new Error("no 'movi' list found");
      if(!info.idx1Pos) throw new Error("no idx1 index found (OpenDML-only file? not handled in this test)");
      log("structure: hdrl@"+info.hdrlPos+"  movi@"+info.moviFourccPos+"  idx1@"+info.idx1Pos);

      var hdrl=parseHdrl(await readBuf(file,info.hdrlPos,info.hdrlSize));
      dtUs=hdrl.microSecPerFrame||Math.round(1e6/(hdrl.fps||30));
      width=hdrl.width||0; height=hdrl.height||0;
      log("avih: "+width+"x"+height+"  "+(1e6/dtUs).toFixed(2)+" fps  ("+dtUs+" µs/frame)  handler="+(hdrl.handler||"?"));

      frames=await readIndex(file,info);
      if(!frames.length) throw new Error("no video frames in index");
      var nKey=0; frames.forEach(function(fr){if(fr.key)nKey++;});
      log("video frames: "+frames.length+"   keyframes: "+nKey+"   GOP≈"+Math.round(frames.length/Math.max(1,nKey)),"ok");

      // inspect first keyframe for SPS / codec
      var first=frames.find(function(fr){return fr.key;})||frames[0];
      var fb=new Uint8Array(await readBuf(file,first.pos,Math.min(first.size,4096)));
      var nal=inspectNals(fb);
      if(nal.sps){ codecStr=codecFromSps(nal.sps); log("SPS found → codec string "+codecStr+(nal.hasSps?"  (in-band SPS ✓)":""),"ok"); }
      else log("no SPS in first keyframe — defaulting codec to "+codecStr,"w");
      if(!nal.hasIdr) log("first keyframe has no IDR NAL (type 5) — keyframe flags may be unreliable","w");

      // codec support probe
      if(VideoDecoder.isConfigSupported){
        var sup=await VideoDecoder.isConfigSupported({codec:codecStr,codedWidth:width,codedHeight:height});
        log("isConfigSupported("+codecStr+") → "+sup.supported, sup.supported?"ok":"e");
      }

      setMeta({file:f.name,size:(f.size/1048576).toFixed(1)+" MB",resolution:width+"×"+height,
               fps:(1e6/dtUs).toFixed(3),frames:frames.length,keyframes:nKey,codec:codecStr});
      $("#capnote").textContent=width+"×"+height+" • "+frames.length+" frames • "+(1e6/dtUs).toFixed(1)+" fps";
      $("#seek").max=frames.length-1; $("#seek").value=0; $("#fcount").textContent="1 / "+frames.length;
      $("#play").disabled=$("#pause").disabled=$("#seek").disabled=false;

      // show the first frame immediately
      seekTo(0,false);
      log("ready — press Play (decodes a frame on screen now via seek to 0)","ok");
    }catch(e){
      log("load failed: "+e.message,"e");
      console.error(e);
    }
  }

  // ---------- drop / pick wiring ----------
  var drop=$("#drop"), fileInput=$("#file");
  drop.onclick=function(){fileInput.click();};
  fileInput.onchange=function(){ if(fileInput.files[0]) load(fileInput.files[0]); };
  ["dragenter","dragover"].forEach(function(ev){window.addEventListener(ev,function(e){e.preventDefault();drop.classList.add("hot");e.dataTransfer.dropEffect="copy";});});
  ["dragleave","drop"].forEach(function(ev){window.addEventListener(ev,function(e){e.preventDefault();drop.classList.remove("hot");});});
  window.addEventListener("drop",function(e){
    e.preventDefault();
    var f=e.dataTransfer.files&&e.dataTransfer.files[0];
    if(f) load(f); else log("no file in drop","w");
  });

  requestAnimationFrame(render);
  log("ready. WebCodecs VideoDecoder: "+(typeof VideoDecoder!=="undefined"?"available":"NOT available"), typeof VideoDecoder!=="undefined"?"ok":"e");
})();
</script>
</body>
</html>
